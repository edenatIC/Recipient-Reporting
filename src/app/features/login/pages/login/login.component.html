<div class="min-h-screen bg-white flex flex-col">
  <!-- Top logo bar -->
  <div class="px-8 py-5">
    <img src="assets/doe-logo.png" alt="U.S. Department of Energy" class="h-10" />
  </div>

  <!-- Centered form -->
  <div class="flex-1 flex items-center justify-center">
    <div class="w-full max-w-[480px] px-6">
      <h1 class="text-[28px] font-bold text-[#101828] mb-6" style="font-family: 'Figtree', sans-serif;">Sign In</h1>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-[#344054] mb-1.5">Email</label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          (blur)="emailTouched.set(true)"
          placeholder=""
          class="w-full px-3.5 py-2.5 border rounded-lg text-sm text-[#101828] outline-none transition-colors"
          [class.border-[#d0d5dd]]="!emailTouched() || emailValid()"
          [class.border-[#985834]]="emailTouched() && !emailValid()"
          [class.focus:border-[#106636]]="true"
        />
        @if (emailTouched() && !emailValid()) {
          <p class="mt-1.5 text-xs text-[#985834]">Please enter a valid email address.</p>
        }
      </div>

      <!-- Password -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-[#344054] mb-1.5">Password</label>
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (blur)="passwordTouched.set(true)"
          placeholder=""
          class="w-full px-3.5 py-2.5 border rounded-lg text-sm text-[#101828] outline-none transition-colors"
          [class.border-[#d0d5dd]]="!passwordTouched() || passwordValid()"
          [class.border-[#985834]]="passwordTouched() && !passwordValid()"
        />
        @if (passwordTouched() && !passwordValid()) {
          <p class="mt-1.5 text-xs text-[#985834]">Password is required.</p>
        }
      </div>

      <!-- Auth error -->
      @if (loginError()) {
        <div class="mb-4 px-4 py-3 bg-[#fff8ea] border border-[#985834] rounded-lg text-sm text-[#985834]">
          {{ loginError() }}
        </div>
      }

      <!-- Sign In button -->
      <button
        (click)="onSignIn()"
        class="w-full py-3 bg-[#106636] hover:bg-[#0d5229] text-white text-sm font-semibold rounded-lg transition-colors cursor-pointer"
      >
        Sign In
      </button>

      <!-- Helper text -->
      <p class="mt-4 text-center text-sm text-[#667085]">
        Recipient email is r&#64;email.com. Admin email is a&#64;email.com
      </p>
    </div>
  </div>
</div>
